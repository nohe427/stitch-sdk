# Generated by @google/jules-fleet init
# This workflow checks for merge conflicts on pull requests.
name: Conflict Detection

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Attempt merge
        id: merge
        continue-on-error: true
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git merge origin/${{ github.event.pull_request.base.ref }} --no-commit --no-ff

      - name: Check for conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          npx -y --package=@google/jules-merge jules-merge check-conflicts --repo ${{ github.repository }} --pr ${{ github.event.pull_request.number }} --sha ${{ github.event.pull_request.head.sha }}

      - name: No conflicts
        if: steps.merge.outcome == 'success'
        run: echo "✅ No merge conflicts detected"
